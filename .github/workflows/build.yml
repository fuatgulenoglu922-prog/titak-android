name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        id: setup-java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set JAVA_HOME for all steps
        run: echo "JAVA_HOME=${{ steps.setup-java.outputs.path }}" >> $GITHUB_ENV

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform and build-tools
        run: |
          sdkmanager "platforms;android-34" "build-tools;34.0.0"
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Verify debug.keystore
        run: |
          ls -la app/debug.keystore || (echo "HATA: app/debug.keystore bulunamadi"; exit 1)

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Get version
        id: version
        run: |
          V=$(grep versionName app/build.gradle | head -1 | sed 's/.*"\([^"]*\)".*/\1/' | tr -d ' \n\r')
          [ -z "$V" ] && V="2.8"
          echo "VERSION=$V" >> $GITHUB_ENV
          echo "version=$V" >> $GITHUB_OUTPUT

      - name: Verify APK
        run: |
          ls -la app/build/outputs/apk/debug/app-debug.apk || (echo "HATA: APK olusturulamadi"; exit 1)

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Create or Update Release (TiTak 2.8)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: TiTak ${{ env.VERSION }}
          body: |
            TiTak ${{ env.VERSION }} - Yapay zeka API baglayici, AI sohbet, GitHub guncelleme
          files: app/build/outputs/apk/debug/app-debug.apk
          fail_on_unmatched_files: false
          update: true
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
