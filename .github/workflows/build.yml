# Android APK - Manuel SDK kurulumu (android-actions bagimliligi yok)
name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        id: java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set JAVA_HOME
        run: echo "JAVA_HOME=${{ steps.java.outputs.path }}" >> $GITHUB_ENV

      # Android SDK - tamamen manuel (android-actions yok)
      - name: Setup Android SDK (manual)
        run: |
          export ANDROID_HOME="$RUNNER_WORKSPACE/android-sdk"
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          mkdir -p "$ANDROID_HOME"
          cd "$ANDROID_HOME"
          wget -q "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip" -O cmdtools.zip
          unzip -q cmdtools.zip
          rm cmdtools.zip
          if [ -f cmdline-tools/bin/sdkmanager ]; then
            SDK_BIN="$ANDROID_HOME/cmdline-tools/bin"
          else
            SDK_BIN="$ANDROID_HOME/$(find cmdline-tools -name sdkmanager -type f | head -1 | xargs dirname)"
          fi
          echo "SDK_BIN=$SDK_BIN" >> $GITHUB_ENV
          echo "$SDK_BIN" >> $GITHUB_PATH

      - name: Accept licenses and install SDK packages
        run: |
          yes | "$SDK_BIN/sdkmanager" --sdk_root="$ANDROID_HOME" --licenses || true
          "$SDK_BIN/sdkmanager" --sdk_root="$ANDROID_HOME" "platforms;android-34" "build-tools;34.0.0"

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          cat local.properties

      - name: Build
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Get version
        id: ver
        run: |
          V=$(grep versionName app/build.gradle | head -1 | sed 's/.*"\([^"]*\)".*/\1/' | tr -d ' \n\r')
          [ -z "$V" ] && V="2.8"
          echo "VERSION=$V" >> $GITHUB_ENV
          echo "version=$V" >> $GITHUB_OUTPUT

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Create Release
        if: success() && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: TiTak ${{ env.VERSION }}
          body: "TiTak ${{ env.VERSION }}"
          files: app/build/outputs/apk/debug/app-debug.apk
          fail_on_unmatched_files: false
          update: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
