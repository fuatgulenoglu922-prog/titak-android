name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform and build-tools
        run: |
          sdkmanager "platforms;android-34" "build-tools;34.0.0"
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew || true

      # If gradlew is missing, this step will generate it
      - name: Generate Gradle Wrapper if missing
        run: |
          if [ ! -f "gradlew" ]; then
            gradle wrapper
          fi

      - name: Generate debug.keystore
        run: |
          mkdir -p app
          $JAVA_HOME/bin/keytool -genkeypair -v -keystore app/debug.keystore -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -storetype PKCS12 -dname "CN=Android Debug, OU=Android, O=Android, L=Unknown, ST=Unknown, C=US"

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Get version from build.gradle
        id: version
        run: |
          V=$(grep versionName app/build.gradle | head -1 | sed 's/.*"\([^"]*\)".*/\1/' | tr -d ' ')
          if [ -z "$V" ]; then V="2.8"; fi
          echo "VERSION=$V" >> $GITHUB_ENV
          echo "version=$V" >> $GITHUB_OUTPUT

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Create or Update Release (tag = version)
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: ${{ env.VERSION }}
          name: TiTak ${{ env.VERSION }}
          body: |
            ## TiTak ${{ env.VERSION }}
            - Yapay zeka API bağlayıcı (OpenAI, Anthropic, Google, uyumlu — otomatik tespit)
            - Geri Bildirim ekranında gerçek AI sohbeti
            - Güncelle: GitHub'dan anında güncelleme
          files: app/build/outputs/apk/debug/app-debug.apk
          update: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
